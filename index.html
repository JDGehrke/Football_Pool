<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL Pick 'Em Pool Dashboard</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #1a202c;
            --text-muted: #4a5568;
            --primary: #013369;
            --accent: #d50a0a;
            --border-color: #e2e8f0;
            --success: #2f855a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, var(--primary), #001e3d);
            color: white;
            padding: 30px 20px;
            border-radius: 12px;
        }

        header h1 { margin: 0 0 10px 0; font-size: 24pt; }
        header p { margin: 0; color: #cbd5e0; font-size: 11pt; }

        .timestamp {
            display: inline-block;
            margin-top: 10px;
            background-color: rgba(255, 255, 255, 0.15);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 9pt;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 14pt;
            color: var(--primary);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
        }

        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 10pt; }
        th { background-color: #f8fafc; color: var(--text-muted); padding: 12px 16px; border-bottom: 2px solid var(--border-color); font-size: 8.5pt; text-transform: uppercase; }
        td { padding: 14px 16px; border-bottom: 1px solid var(--border-color); }
        tr:hover { background-color: #f8fafc; }
        .rank { font-weight: bold; color: var(--text-muted); width: 50px; }
        .player-name { font-weight: 600; color: var(--primary); }

        .badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 9pt; font-weight: bold; }
        .badge-win { background-color: #e6fffa; color: var(--success); }
        .badge-cold { background-color: #fff5f5; color: #9b2c2c; }
        .badge-neutral { background-color: #f7fafc; color: #4a5568; }

        .chart-container { display: flex; flex-direction: column; gap: 16px; }
        .chart-row { display: flex; align-items: center; }
        .chart-label { width: 140px; font-weight: 600; font-size: 10pt; }
        .chart-bar-wrapper { flex-grow: 1; background-color: #edf2f7; border-radius: 6px; height: 24px; overflow: hidden; }
        .chart-bar { height: 100%; background: linear-gradient(90deg, var(--primary), #004b93); border-radius: 6px; display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; }
        .chart-value { color: white; font-size: 9pt; font-weight: bold; }
        
        /* Leader styling highlight */
        .chart-row.leader-row .chart-bar { background: linear-gradient(90deg, #0d9488, #2cc7b8); }
        .chart-row.leader-row .chart-label { color: #0d9488; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🏈 Family NFL Pick 'Em Pool</h1>
            <p id="week-title">Loading standings...</p>
            <div class="timestamp" id="update-time">Syncing...</div>
        </header>

        <div class="card">
            <h2>Win Standings Visualization</h2>
            <div class="chart-container" id="chart-content">
                <!-- JavaScript handles this -->
            </div>
        </div>

        <div class="card">
            <h2>Detailed Pool Leaderboard</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th class="rank">Rank</th>
                            <th>Player</th>
                            <th>Correct Picks</th>
                            <th>Incorrect Picks</th>
                            <th>Win %</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="table-content">
                        <!-- JavaScript handles this -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Fetch data with a timestamp to completely bypass browser caching issues
        fetch(`data.json?v=${new Date().getTime()}`)
            .then(response => response.json())
            .then(data => {
                // 1. Update Header Text
                document.getElementById('week-title').innerText = `Live Leaderboard & Responses — ${data.week}`;
                document.getElementById('update-time').innerText = `Last Updated: ${data.last_updated} (Live)`;

                const standings = data.standings;
                
                // Find max wins to calculate relative bar percentage sizing accurately
                const maxWins = Math.max(...standings.map(p => p.wins)) || 1;

                let chartHTML = '';
                let tableHTML = '';

                standings.forEach((player, index) => {
                    // Determine if they are in 1st place
                    const isLeader = index === 0 || player.status === 'Leader';
                    const rowClass = isLeader ? 'chart-row leader-row' : 'chart-row';
                    const labelDecoration = isLeader ? `${player.name} ⭐` : player.name;
                    
                    // Calculate visual width scaling relative to the current frontrunner
                    const barWidth = (player.wins / maxWins) * 100;

                    // Build Chart Row Component
                    chartHTML += `
                        <div class="${rowClass}">
                            <div class="chart-label">${labelDecoration}</div>
                            <div class="chart-bar-wrapper">
                                <div class="chart-bar" style="width: ${barWidth}%">
                                    <span class="chart-value">${player.wins} Wins</span>
                                </div>
                            </div>
                        </div>
                    `;

                    // Handle status badges nicely
                    let badgeClass = 'badge badge-neutral';
                    if (player.status === 'Leader') badgeClass = 'badge badge-win';
                    if (player.status === 'Cold Streak') badgeClass = 'badge badge-cold';

                    // Build Table Row Component
                    tableHTML += `
                        <tr>
                            <td class="rank">${player.rank}</td>
                            <td class="player-name">${player.name}</td>
                            <td>${player.wins}</td>
                            <td>${player.losses}</td>
                            <td>${player.pct}%</td>
                            <td><span class="${badgeClass}">${player.status}</span></td>
                        </tr>
                    `;
                });

                // 2. Inject the built HTML blocks into the DOM containers
                document.getElementById('chart-content').innerHTML = chartHTML;
                document.getElementById('table-content').innerHTML = tableHTML;
            })
            .catch(error => {
                console.error("Error parsing pool data json:", error);
                document.getElementById('week-title').innerText = "Error loading latest scores.";
            });
    </script>
</body>
</html>
